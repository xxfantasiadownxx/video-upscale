# Usage: called by run.sh — do not run directly.
# run.sh sets: EPISODE_FILE, OUTPUT_FILE, EPISODE_FPS
services:
  extract:
    image: jrottenberg/ffmpeg:4.4-nvidia
    container_name: restore-ffmpeg-extract
    volumes:
      - ./original_video_files:/original_video_files
      - ./original_frame_files:/original_frame_files
    entrypoint:
      - ffmpeg
      - -hwaccel
      - cuda
      - -i
      - /original_video_files/${EPISODE_FILE}
      - /original_frame_files/frame%08d.png
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu, compute, video, utility]
    runtime: nvidia

  upscale:
    image: ghcr.io/ralphv/realesrgan-with-models
    container_name: restore-upscale
    volumes:
      - ./original_frame_files:/original_frame_files
      - ./upscaled_frame_files:/upscaled_frame_files
    # No custom entrypoint — use the image's default (inference_realesrgan.py)
    command:
      - -n
      - realesr-general-x4v3
      - -i
      - /original_frame_files
      - -o
      - /upscaled_frame_files
      - --ext
      - png
      - --tile
      - "64"
      - --tile_pad
      - "10"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu, compute, video, utility]
    runtime: nvidia
    depends_on:
      extract:
        condition: service_completed_successfully

  reassemble:
    image: jrottenberg/ffmpeg:4.4-nvidia
    container_name: restore-ffmpeg-reassemble
    volumes:
      - ./upscaled_frame_files:/upscaled_frame_files
      - ./original_video_files:/original_video_files
      - ./upscaled_video_files:/upscaled_video_files
    entrypoint:
      - ffmpeg
      - -hwaccel
      - cuda
      - -framerate
      - ${EPISODE_FPS}
      - -i
      - /upscaled_frame_files/frame%08d.png
      - -i
      - /original_video_files/${EPISODE_FILE}
      - -map
      - "0:v"
      - -map
      - "1:a"
      - -vf
      - scale=-2:1080
      - -r
      - ${EPISODE_FPS}
      - -c:v
      - h264_nvenc
      - -preset
      - p4
      - -rc
      - vbr
      - -cq
      - "18"
      - -c:a
      - copy
      - -vsync
      - cfr
      - /upscaled_video_files/${OUTPUT_FILE}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu, compute, video, utility]
    runtime: nvidia
    depends_on:
      upscale:
        condition: service_completed_successfully
