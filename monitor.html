<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Upscale Monitor</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0f0f0f; color: #e0e0e0; font-family: 'Courier New', monospace; font-size: 14px; padding: 24px; }
  h1 { color: #fff; font-size: 20px; margin-bottom: 6px; letter-spacing: 1px; }
  .subtitle { color: #555; font-size: 12px; margin-bottom: 24px; }

  .summary-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 24px; }
  .card { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 6px; padding: 16px; }
  .card-label { color: #666; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
  .card-value { font-size: 28px; font-weight: bold; color: #fff; }
  .card-value.green { color: #4ade80; }
  .card-value.red { color: #f87171; }
  .card-value.yellow { color: #fbbf24; }
  .card-value.blue { color: #60a5fa; }

  .current-box { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 6px; padding: 16px; margin-bottom: 24px; }
  .current-label { color: #666; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
  .current-file { color: #fff; font-size: 15px; margin-bottom: 10px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .stage-row { display: flex; gap: 8px; align-items: center; margin-bottom: 4px; }
  .stage-pip { width: 8px; height: 8px; border-radius: 50%; background: #333; flex-shrink: 0; }
  .stage-pip.active { background: #fbbf24; box-shadow: 0 0 6px #fbbf24; animation: pulse 1.2s ease-in-out infinite; }
  .stage-pip.done { background: #4ade80; }
  .stage-name { color: #aaa; font-size: 12px; }
  .stage-name.active { color: #fbbf24; }
  .stage-name.done { color: #4ade80; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  .overall-bar-wrap { margin-bottom: 24px; }
  .bar-label { color: #666; font-size: 11px; margin-bottom: 4px; }
  .bar-track { background: #252525; border-radius: 4px; height: 8px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 4px; transition: width 0.5s ease; background: #3b82f6; }
  .bar-fill.complete { background: #4ade80; }

  .file-list { display: flex; flex-direction: column; gap: 4px; }
  .file-row { display: flex; align-items: center; gap: 10px; background: #1a1a1a; border: 1px solid #222; border-radius: 4px; padding: 8px 12px; transition: border-color 0.2s; }
  .file-row.running { border-color: #fbbf24; }
  .file-row.done { border-color: #1f3a2a; }
  .file-row.failed { border-color: #3a1f1f; cursor: pointer; }
  .file-num { color: #444; font-size: 11px; width: 32px; flex-shrink: 0; text-align: right; }
  .file-icon { width: 16px; flex-shrink: 0; text-align: center; }
  .file-name { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #ccc; }
  .file-name.running { color: #fbbf24; }
  .file-name.done { color: #4ade80; }
  .file-name.failed { color: #f87171; }
  .file-stage { color: #555; font-size: 11px; flex-shrink: 0; width: 90px; text-align: right; }
  .file-stage.running { color: #fbbf24; }
  .file-duration { color: #4ade80; font-size: 11px; flex-shrink: 0; width: 72px; text-align: right; font-variant-numeric: tabular-nums; }
  .file-duration.failed { color: #f87171; }
  .file-duration.running { color: #fbbf24; }

  .error-detail { background: #1a0f0f; border: 1px solid #3a1f1f; border-radius: 4px; padding: 8px 12px; margin-top: 4px; font-size: 11px; color: #f87171; white-space: pre-wrap; display: none; }

  .refresh-row { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
  .refresh-btn { background: #222; border: 1px solid #333; color: #aaa; padding: 6px 14px; border-radius: 4px; cursor: pointer; font-family: inherit; font-size: 12px; }
  .refresh-btn:hover { background: #2a2a2a; color: #fff; }
  .auto-label { color: #555; font-size: 12px; }
  .dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: #4ade80; margin-right: 6px; animation: pulse 1.2s infinite; }
  .dot.paused { background: #555; animation: none; }

  .no-data { color: #444; text-align: center; padding: 60px; font-size: 13px; }
  .path-hint { color: #333; font-size: 11px; margin-top: 8px; }
  .section-title { color: #555; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
</style>
</head>
<body>

<h1>⬆ Upscale Monitor</h1>
<p class="subtitle">Reads status.json — place this file in the same folder as run.sh / run_anime.sh</p>

<div class="refresh-row">
  <button class="refresh-btn" onclick="load()">↺ Refresh</button>
  <label style="display:flex;align-items:center;gap:6px;cursor:pointer">
    <input type="checkbox" id="autoRefresh" checked onchange="toggleAuto()">
    <span class="auto-label"><span class="dot" id="dotEl"></span>Auto-refresh every 5s</span>
  </label>
  <span id="lastUpdate" style="color:#444;font-size:11px;margin-left:auto"></span>
</div>

<div id="app"><div class="no-data">No status.json found yet.<div class="path-hint">Start run.sh or run_anime.sh — the file will appear automatically.</div></div></div>

<script>
let autoTimer = null;
let tickTimer = null;
let batchStartEpoch = null;   // unix seconds from status.json
let loadedAt = null;          // Date.now() when we last fetched
let lastData = null;

const STAGES = ["probing","extracting","upscaling","reassembling","complete"];
function stageIndex(s) { return STAGES.indexOf(s); }

function fmt(sec) {
  if (sec == null || sec < 0) return "--:--:--";
  sec = Math.floor(sec);
  const h = Math.floor(sec/3600), m = Math.floor((sec%3600)/60), s = sec%60;
  return [h,m,s].map(v=>String(v).padStart(2,'0')).join(':');
}

function liveElapsed() {
  if (batchStartEpoch == null || loadedAt == null) return null;
  const baseSec = (loadedAt / 1000) - batchStartEpoch; // elapsed at load time
  const sinceLoad = (Date.now() - loadedAt) / 1000;
  return baseSec + sinceLoad;
}

function icon(status) {
  if (status === 'done')    return '<span style="color:#4ade80">✓</span>';
  if (status === 'failed')  return '<span style="color:#f87171">✗</span>';
  if (status === 'running') return '<span style="color:#fbbf24;animation:pulse 1.2s infinite;display:inline-block">◉</span>';
  return '<span style="color:#333">○</span>';
}

function fileDuration(f) {
  // If file has start/end timestamps recorded, compute exact duration
  if (f.start_time && f.end_time) {
    return fmt(f.end_time - f.start_time);
  }
  // If currently running, show live timer
  if (f.status === 'running' && f.start_time && loadedAt) {
    const base = (loadedAt / 1000) - f.start_time;
    return fmt(base); // will be updated each tick via updateTimers()
  }
  return '';
}

function render(data) {
  lastData = data;
  batchStartEpoch = data.batch_start;
  loadedAt = Date.now();

  const pct = data.total > 0 ? Math.round((data.succeeded + data.failed) / data.total * 100) : 0;
  const complete = data.current_stage === 'complete';
  const currentStageIdx = stageIndex(data.current_stage);

  let stageHtml = '';
  STAGES.filter(s => s !== 'complete').forEach((s, i) => {
    const isDone = complete || currentStageIdx > i;
    const isActive = !complete && currentStageIdx === i;
    stageHtml += `<div class="stage-row">
      <div class="stage-pip ${isDone?'done':isActive?'active':''}"></div>
      <span class="stage-name ${isDone?'done':isActive?'active':''}">${s}</span>
    </div>`;
  });

  const filesHtml = data.files.map((f, i) => {
    const hasError = f.error && f.error.trim();
    const dur = fileDuration(f);
    const durClass = f.status === 'running' ? 'running' : f.status === 'failed' ? 'failed' : '';
    return `
      <div class="file-row ${f.status}" ${hasError ? `onclick="toggleErr(${i})"` : ''}>
        <span class="file-num">${i+1}</span>
        <span class="file-icon">${icon(f.status)}</span>
        <span class="file-name ${f.status}" title="${f.name}">${f.name}</span>
        <span class="file-stage ${f.status==='running'?'running':''}">${f.stage||''}</span>
        <span class="file-duration ${durClass}" id="fdur_${i}">${dur}</span>
      </div>
      ${hasError ? `<div class="error-detail" id="err_${i}">${f.error.trim()}</div>` : ''}`;
  }).join('');

  document.getElementById('app').innerHTML = `
    <div class="summary-grid">
      <div class="card"><div class="card-label">Total Files</div><div class="card-value blue">${data.total}</div></div>
      <div class="card"><div class="card-label">Succeeded</div><div class="card-value green">${data.succeeded}</div></div>
      <div class="card"><div class="card-label">Failed</div><div class="card-value red">${data.failed}</div></div>
      <div class="card"><div class="card-label">Elapsed</div><div class="card-value yellow" id="elapsedCard">${fmt(liveElapsed())}</div></div>
    </div>

    <div class="overall-bar-wrap">
      <div class="bar-label">Overall progress — ${pct}% (${data.succeeded + data.failed} / ${data.total} files)</div>
      <div class="bar-track"><div class="bar-fill ${complete?'complete':''}" style="width:${pct}%"></div></div>
    </div>

    ${!complete ? `
    <div class="current-box">
      <div class="current-label">Currently processing</div>
      <div class="current-file">${data.current_file || '—'}</div>
      ${stageHtml}
    </div>` : `<div class="current-box" style="margin-bottom:24px"><div class="current-label" style="color:#4ade80">✓ Batch complete</div></div>`}

    <div class="section-title">All files</div>
    <div class="file-list">${filesHtml}</div>
  `;

  // Start 1-second tick for live timers
  clearInterval(tickTimer);
  if (!complete) tickTimer = setInterval(updateTimers, 1000);
}

function updateTimers() {
  // Batch elapsed — always ticking
  const el = document.getElementById('elapsedCard');
  if (el) el.textContent = fmt(liveElapsed());

  // Per-file running timers
  if (!lastData) return;
  lastData.files.forEach((f, i) => {
    if (f.status === 'running' && f.start_time) {
      const el = document.getElementById('fdur_' + i);
      if (el) {
        const sec = (Date.now() / 1000) - f.start_time;
        el.textContent = fmt(sec);
      }
    }
  });
}

function toggleErr(i) {
  const el = document.getElementById('err_' + i);
  if (el) el.style.display = el.style.display === 'block' ? 'none' : 'block';
}

async function load() {
  try {
    const r = await fetch('status.json?_=' + Date.now());
    if (!r.ok) throw new Error('not found');
    const data = await r.json();
    render(data);
    document.getElementById('lastUpdate').textContent = 'Last update: ' + new Date().toLocaleTimeString();
  } catch(e) { /* leave existing display */ }
}

function toggleAuto() {
  const cb = document.getElementById('autoRefresh');
  const dot = document.getElementById('dotEl');
  if (cb.checked) {
    dot.classList.remove('paused');
    autoTimer = setInterval(load, 5000);
  } else {
    dot.classList.add('paused');
    clearInterval(autoTimer);
  }
}

load();
autoTimer = setInterval(load, 5000);
</script>
</body>
</html>
