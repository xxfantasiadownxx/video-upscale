# Usage: called by run_anime.sh after frame renaming — do not run directly.
services:
  reassemble:
    image: jrottenberg/ffmpeg:4.4-nvidia
    container_name: anime-ffmpeg-reassemble
    volumes:
      - ./upscaled_frame_files:/upscaled_frame_files
      - ./original_video_files:/original_video_files
      - ./upscaled_video_files:/upscaled_video_files
      - ./scripts/reassemble.sh:/reassemble.sh:ro
    entrypoint: ["/bin/sh", "/reassemble.sh"]
    environment:
      - EPISODE_FILE=${EPISODE_FILE}
      - EPISODE_FPS=${EPISODE_FPS}
      - OUTPUT_FILE=${OUTPUT_FILE}
      - HAS_AUDIO=${HAS_AUDIO}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu, compute, video, utility]
    runtime: nvidia
